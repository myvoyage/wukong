# =============================================================================
# Wukong Configuration — v0.1.14 Full Template
# =============================================================================
# Go: 1.26 | .go: 221 (47 _test.go) | 内部包: 28 | Structs: 42 | Fields: 292
# CLI: 28 top-level + 55+ sub | Dependencies: 28 direct + 77 indirect
#
# Loading priority (high to low):
#   1. CLI flags (--provider, --model, --temperature, --max-tokens, --config)
#   2. Env vars (WUKONG_ prefix, e.g. WUKONG_DEFAULT_PROVIDER)
#   3. --config CLI-specified file
#   4. ./config.yaml (current directory)
#   5. ~/.config/wukong/config.yaml
#   6. /etc/wukong/config.yaml (non-Windows only)
#   7. Built-in defaults (setDefaults())
#
# Env var expansion: ${ENV_VAR} resolved at runtime.
#   api_key: "${OPENAI_API_KEY}"
# =============================================================================

log_level: "info"
default_provider: "lmstudio"

# =============================================================================
# Lightweight Model — shared by background tasks
# =============================================================================
# Fallback: subsystem.extractor_model → lightweight_model → default_provider
lightweight_provider: "lmstudio"
lightweight_model: "gemma-4-e4b-it"

# =============================================================================
# 1. Providers — AI model providers (7 types)
# =============================================================================
# Types: openai | anthropic | google | deepseek | ollama | lmstudio | acp
providers:
  - name: "openai"
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  - name: "deepseek"
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"

  - name: "anthropic"
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"

  - name: "ollama"
    type: "ollama"
    api_key: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "llama3"

  - name: "lmstudio"
    type: "lmstudio"
    api_key: "lmstudio"
    base_url: "http://192.168.50.97:1234/v1"
    model: "google/gemma-4-26b-a4b"

  - name: "acp-coder"
    type: "acp"
    agent_url: "http://localhost:4000"
    model: "acp-default"

# =============================================================================
# 2. Agent — Core behaviour (30 fields)
# =============================================================================
agent:
  max_llm_calls: 50
  max_tool_iterations: 30
  max_run_duration: "600s"
  parallel_tools: true
  streaming: true
  temperature: 0.7
  max_tokens: 4096
  tool_retry_enabled: true
  tool_retry_max_attempts: 3
  tool_retry_initial_wait: "1s"
  tool_retry_backoff_factor: 2.0
  enable_post_tool_prompt: true
  planner: ""                              # builtin | react | ""
  tool_search_enabled: true
  context_compaction: true
  session_recall_enabled: false
  json_repair_enabled: false
  todo_tool_enabled: true
  todo_enforcer_enabled: true
  agent_tools_enabled: false
  system_prompt_dir: "~/.config/wukong/prompts/"
  # recipe_dir: ".wukong/recipes/"
  # recipe_enabled: true

# =============================================================================
# 3. Security — multi-layer defence (13 fields)
# =============================================================================
security:
  permission_mode: "smart"                  # auto | smart | manual | chat_only
  require_approval: false
  malware_scan_enabled: true
  block_dangerous_commands: true
  blocked_commands:
    - "rm -rf /"
    - "dd if=/dev/zero"
    - "mkfs."
    - "> /dev/sda"
    - "fork bomb"
  default_timeout: "60s"
  max_timeout: "300s"
  allowlist: []
  denylist: []
  guardrail_enabled: false                 # Prompt injection guard
  ignore_file_enabled: true
  ignore_file: ".wukongignore"

# =============================================================================
# 4. Session — persistence (9 fields)
# =============================================================================
session:
  backend: "sqlite"                         # sqlite | memory | redis
  db_path: "wukong.db"
  event_limit: 500
  ttl: "0h"
  enable_summary: true
  summary_trigger: 50

# =============================================================================
# 5. Memory — tRPC Memory (9 fields)
# =============================================================================
memory:
  backend: "sqlite"
  db_path: "wukong.db"
  max_memories: 100
  auto_extract: true
  extract_timeout: "1200s"
  extractor_provider: "lmstudio"
  enable_smart_cleanup: true                # 80% trigger → 60% target
  cleanup_trigger_threshold: 0.8
  cleanup_target_threshold: 0.6
  memory_ttl: "720h"
  extractor_prompt: |
    You are a Memory Manager. Extract concise memories from the conversation.
    Today's date is {current_date}.
    <rules>
    1. Atomicity: One fact per memory.
    2. No subject prefix: Never start with "User", "The user", etc.
    3. Deduplication: Check existing memories before adding.
    4. Specificity: Include names, dates, places, quantities.
    5. Episode vs Fact: Episode = events with time, Fact = stable attributes.
    6. All speakers: Extract info about EVERY person.
    7. Skip transient greetings or trivial queries.
    </rules>

# =============================================================================
# 6. Todo — task tracking (5 fields)
# =============================================================================
todo:
  backend: "sqlite"
  db_path: "wukong.db"
  enable_native_todo: true
  enable_enforcer: true

# =============================================================================
# 7-11. CortexDB Memory Stack (5-layer)
# =============================================================================
recall:                                     # FTS5 full-text search
  enabled: true
  backend: "sqlite"
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  search_mode: "fts5"                       # fts5 | hybrid

cortex:                                     # HNSW vector + full-text
  enabled: true
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  embedding_base_url: "http://192.168.50.97:1234"
  embedding_api_key: "lmstudio"
  embedding_model: "qwen3-embedding-0.6b-graphql"

memoryflow:                                 # Transcription + semantic wake
  enabled: true
  db_path: "wukong.db"
  namespace: "assistant"
  embedding_dimensions: 0                   # 0=auto-detect

graphflow:                                  # Knowledge graph (RDF+SPARQL)
  enabled: true
  db_path: "wukong.db"
  max_chars_per_doc: 8000
  auto_extract: true

importflow:                                 # Structured data import (DDL→KG)
  enabled: true
  db_path: "wukong.db"

# =============================================================================
# 12. Revision — context window mgmt (10 fields)
# =============================================================================
revision:
  enabled: true
  revision_provider: "lmstudio"
  enable_llm_summarize: true
  summary_cooldown: 120s
  summary_timeout: 30s
  max_command_output: 8000
  enable_semantic_search: false
  search_strategy: "include_all"
  max_context_tokens: 64000
  trim_ratio: 0.3

# =============================================================================
# 13. Browser — dual-backend browser automation (14 fields)
# =============================================================================
browser:
  enabled: true
  browser_type: "chromium"                  # chromium | http (no JS)
  headless: true
  browser_path: ""                          # Chrome path (empty=auto-detect)
  stealth: false                            # Anti-detection: 13 JS + 11 Chrome flags
  cache_dir: ".wukong/cache"
  max_download_size: 104857600
  timeout: "60s"
  viewport_width: 1280
  viewport_height: 720
  search_backend: "duckduckgo"             # duckduckgo | searxng | tavily

# =============================================================================
# 14-17. Visualiser | Tutorial | TopOfMind | CodeMode
# =============================================================================
visualiser:
  enabled: true
  output_dir: ".wukong/visuals"
  max_width: 1200
  max_height: 800

tutorial:
  enabled: true
  language: "zh"

top_of_mind:
  enabled: true
  instruction_file: ".wukong/instructions.md"
  max_length: 2000

code_mode:
  enabled: true
  timeout: "10s"
  max_memory_mb: 128

# =============================================================================
# 18. Apps — HTML app management + website cloning + ZIM packaging
# =============================================================================
apps:
  enabled: true
  app_dir: ".wukong/apps"

  clone:                                    # EnhancedCloner engine
    # Crawl scope
    max_pages: 0                            # 0=unlimited
    max_depth: 0                            # 0=unlimited
    traversal: "bfs"                        # bfs | dfs
    subdomains: false
    scope_prefix: ""
    # Rendering
    workers: 4
    asset_workers: 4
    timeout: 60                             # seconds
    settle: 1500                            # network-idle settle (ms)
    scroll: false
    user_agent: ""                          # empty=use default
    # Asset policy
    asset_same_domain: true                 # skip 3rd-party CDN assets
    max_asset_bytes: 52428800               # 50MB per-asset cap
    # skip_asset_exts defaults in DefaultSkipAssetExts() — 38 extensions
    # Compliance
    respect_robots: true                    # temoto/robotstxt library
    crawl_delay: 0                          # ms, 0=use robots.txt
    no_sitemap: false
    # Optimizations
    dedup_content: true                     # SHA-256 + hard links
    mobile_readable: true
    enable_resume: true                     # state.json atomic write
    incremental: false                      # ETag/Last-Modified cache
    cache_max_age: 86400
    # Anti-detection
    stealth: false                          # 13 JS + 11 Chrome flags
    antibot_enabled: true                   # auto-detect + escalate
    antibot_auto_escalate: true
    chrome_path: ""                         # empty=auto-detect
    # Session
    cookie_file: ""                         # Netscape-format cookie file

  pack:                                     # ZIM / binary / app packaging
    compress: true                          # zstd code 5, ZIM v6 spec
    incremental: false                      # cluster cache reuse
    language: "eng"                         # ISO 639-3
    creator: "Wukong"
    format: "html"                          # html | zim | binary | app

# =============================================================================
# 19. ARD — Agentic Resource Discovery (5 fields)
# =============================================================================
ard:
  enabled: false
  registry_url: ""
  catalog_path: ".wukong/ard/catalog.json"
  publish_enabled: false

# =============================================================================
# 20. Summon — sub-agent delegation + A2A remotes (5 + 13 fields)
# =============================================================================
summon:
  enabled: true
  skills_dir: ".wukong/skills"
  max_concurrent: 5
  a2a_remotes: []

# =============================================================================
# 21. Skill — agent skill repository (4 fields)
# =============================================================================
skill:
  enabled: true
  skills_dir: ".wukong/skills"
  auto_load: true
  max_skills: 20

# =============================================================================
# 22. Evolution — skill self-evolution (10 fields)
# =============================================================================
evolution:
  enabled: false
  auto_patch: false
  analysis_provider: ""
  analysis_model: ""
  min_confidence: 0.7
  cooldown_period: "30m"
  max_patches_per_day: 10
  max_versions_kept: 10
  max_patch_size: 8192
  analysis_timeout: "60s"

# =============================================================================
# 23. Knowledge — RAG knowledge base (10 fields)
# =============================================================================
knowledge:
  enabled: false
  embedder_provider: "lmstudio"
  embedder_model: "qwen3-embedding-4b"
  vector_store: "inmemory"
  max_results: 5
  enable_source_sync: false
  reranker_enabled: false
  search_tool_name: "knowledge_search"

# =============================================================================
# 24. Workflow — multi-mode agent orchestration (10 fields)
# =============================================================================
workflow:
  mode: "single"
  max_iterations: 10
  cycle_mode: "default"
  stream_mode: "none"
  cache_enabled: false
  engine: "bsp"
  sub_agents: []

# =============================================================================
# 25. Dify — Dify AI platform integration (6 fields)
# =============================================================================
dify:
  enabled: false
  agent_name: "dify"
  enable_streaming: false
  timeout: "120s"

# =============================================================================
# 26. Service Endpoints — 4 protocols
# =============================================================================
a2a_server:                                 # A2A :9090
  enabled: true
  address: ":9090"
  agent_name: "wukong"
  agent_description: "Wukong AI Agent — A2A endpoint"

agui:                                       # AG-UI SSE :8080
  enabled: true
  address: ":8080"
  path: "/agui"

acp_server:                                 # ACP :9091
  enabled: true
  address: ":9091"
  path: "/acp"
  enable_streaming: true

acp_mcp:                                    # ACP MCP Bridge :3400
  enabled: true
  address: ":3400"
  path: "/mcp"

# =============================================================================
# 27. Eval — agent evaluation (4 fields)
# =============================================================================
eval:
  enabled: false
  evalset_path: ".wukong/evals/default.evalset.json"
  results_path: ".wukong/evals/results.json"

# =============================================================================
# 28. Extensions — external MCP extensions (17 fields per entry)
# =============================================================================
extensions: []
  # Example:
  # - name: "filesystem"
  #   type: "stdio"
  #   command: "npx"
  #   args: ["-y", "@anthropic/mcp-filesystem", "/path"]

# =============================================================================
# 29-32. Observability | Artifact | Telemetry | Project
# =============================================================================
telemetry:
  enabled: false
  exporter_type: "console"
  endpoint: "localhost:4317"
  service_name: "wukong"
  service_version: "1.0.0"
  environment: "development"
  sample_rate: 1.0

observability:
  langfuse_enabled: false

artifact:
  backend: "inmemory"

project_dir: "~/.config/wukong/"
