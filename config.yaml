# =============================================================================
# Wukong Configuration — Full Template
# =============================================================================
# Go: 1.26 | .go: 221 (51 _test.go) | Packages: 28 | Structs: 43 | Fields: ~310
# CLI: 28 top-level + 55+ sub | Dependencies: 29 direct + 105 indirect
# Clone: 32 EnhancedClonerOptions fields | 18 files | 2.7k+ lines
# Antibot: 161 UA pool | 5 escalation levels | 26 tests
#
# Loading priority (high to low):
#   1. CLI flags (--provider, --model, --temperature, --max-tokens, --config)
#   2. Env vars (WUKONG_ prefix)
#   3. --config CLI-specified file
#   4. ./config.yaml (current directory)
#   5. ~/.config/wukong/config.yaml
#   6. /etc/wukong/config.yaml (non-Windows)
#   7. Built-in defaults
#
# Env var expansion: ${ENV_VAR}
# =============================================================================

log_level: "info"
default_provider: "lmstudio"

# Background tasks (memory extraction, summarisation, KG).
lightweight_provider: "lmstudio"
lightweight_model: "gemma-4-e4b-it"

# =============================================================================
# 1. Providers — LLM backends (7 types)
# =============================================================================
# Types: openai | anthropic | google | deepseek | ollama | lmstudio | acp
providers:
  - name: "openai"
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  - name: "deepseek"
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"

  - name: "anthropic"
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"

  - name: "ollama"
    type: "ollama"
    api_key: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "llama3"

  - name: "lmstudio"
    type: "lmstudio"
    api_key: "lmstudio"
    base_url: "http://192.168.50.97:1234/v1"
    model: "google/gemma-4-26b-a4b"

  - name: "acp-coder"
    type: "acp"
    agent_url: "http://localhost:4000"
    model: "acp-default"

# =============================================================================
# 2. Agent — Core behaviour (32 fields)
# =============================================================================
agent:
  max_llm_calls: 50
  max_tool_iterations: 30
  max_run_duration: "600s"
  parallel_tools: true
  streaming: true
  temperature: 0.7
  max_tokens: 4096
  tool_retry_enabled: true
  tool_retry_max_attempts: 3
  tool_retry_initial_wait: "1s"
  tool_retry_backoff_factor: 2.0
  enable_post_tool_prompt: true
  planner: ""
  tool_search_enabled: true
  context_compaction: true
  session_recall_enabled: false
  json_repair_enabled: false
  todo_tool_enabled: true
  todo_enforcer_enabled: true
  agent_tools_enabled: false
  system_prompt_dir: "~/.config/wukong/prompts/"

# =============================================================================
# 3. Security (13 fields)
# =============================================================================
security:
  permission_mode: "smart"
  require_approval: false
  malware_scan_enabled: true
  block_dangerous_commands: true
  blocked_commands:
    - "rm -rf /"
    - "dd if=/dev/zero"
    - "mkfs."
    - "> /dev/sda"
    - "fork bomb"
  default_timeout: "60s"
  max_timeout: "300s"
  allowlist: []
  denylist: []
  guardrail_enabled: false
  ignore_file_enabled: true
  ignore_file: ".wukongignore"

# =============================================================================
# 4. Session (6 fields)
# =============================================================================
session:
  backend: "sqlite"
  db_path: "wukong.db"
  event_limit: 500
  ttl: "0h"
  enable_summary: true
  summary_trigger: 50

# =============================================================================
# 5. Memory (9 fields)
# =============================================================================
memory:
  backend: "sqlite"
  db_path: "wukong.db"
  max_memories: 100
  auto_extract: true
  extract_timeout: "1200s"
  extractor_provider: "lmstudio"
  enable_smart_cleanup: true
  cleanup_trigger_threshold: 0.8
  cleanup_target_threshold: 0.6
  memory_ttl: "720h"
  extractor_prompt: |
    You are a Memory Manager. Extract concise memories from the conversation.
    Today's date is {current_date}.
    <rules>
    1. Atomicity: One fact per memory.
    2. No subject prefix: Never start with "User", "The user", etc.
    3. Deduplication: Check existing memories before adding.
    4. Specificity: Include names, dates, places, quantities.
    5. Episode vs Fact: Episode = events with time, Fact = stable attributes.
    6. All speakers: Extract info about EVERY person.
    7. Skip transient greetings or trivial queries.
    </rules>

# =============================================================================
# 6. Todo (5 fields)
# =============================================================================
todo:
  backend: "sqlite"
  db_path: "wukong.db"
  enable_native_todo: true
  enable_enforcer: true

# =============================================================================
# 7–11. CortexDB Memory Stack
# =============================================================================
recall:                                          # FTS5
  enabled: true
  backend: "sqlite"
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  search_mode: "fts5"

cortex:                                          # HNSW vector
  enabled: true
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  embedding_base_url: "http://192.168.50.97:1234"
  embedding_api_key: "lmstudio"
  embedding_model: "qwen3-embedding-0.6b-graphql"

memoryflow:                                      # Transcription + semantic wake
  enabled: true
  db_path: "wukong.db"
  namespace: "assistant"
  embedding_dimensions: 0

graphflow:                                       # Knowledge graph (RDF+SPARQL)
  enabled: true
  db_path: "wukong.db"
  max_chars_per_doc: 8000
  auto_extract: true

importflow:                                      # Structured data import
  enabled: true
  db_path: "wukong.db"

# =============================================================================
# 12. Revision (10 fields)
# =============================================================================
revision:
  enabled: true
  revision_provider: "lmstudio"
  enable_llm_summarize: true
  summary_cooldown: 120s
  summary_timeout: 30s
  max_command_output: 8000
  enable_semantic_search: false
  search_strategy: "include_all"
  max_context_tokens: 64000
  trim_ratio: 0.3

# =============================================================================
# 13. Browser (15 fields)
# =============================================================================
browser:
  enabled: true
  browser_type: "chromium"
  headless: true                            # --no-headless for visible window
  browser_path: ""
  stealth: true                             # 13 JS + 11 Chrome flags (default on)
  cache_dir: ".wukong/cache"
  max_download_size: 104857600
  timeout: "60s"
  viewport_width: 1280
  viewport_height: 720
  search_backend: "duckduckgo"

# =============================================================================
# 14–17. Visualiser | Tutorial | TopOfMind | CodeMode
# =============================================================================
visualiser:
  enabled: true
  output_dir: ".wukong/visuals"
  max_width: 1200
  max_height: 800

tutorial:
  enabled: true
  language: "zh"

top_of_mind:
  enabled: true
  instruction_file: ".wukong/instructions.md"
  max_length: 2000

code_mode:
  enabled: true
  timeout: "10s"
  max_memory_mb: 128

# =============================================================================
# 18. Apps — Website cloning + ZIM packaging (32 EnhancedClonerOptions fields)
# =============================================================================
apps:
  enabled: true
  app_dir: ".wukong/apps"

  clone:
    # Crawl scope
    max_pages: 0                            # 0 = unlimited
    max_depth: 0
    traversal: "bfs"                        # bfs | dfs
    subdomains: false
    scope_prefix: ""

    # Rendering (defaults from DefaultEnhancedOptions)
    workers: 4                              # Page render goroutines
    asset_workers: 8                        # Asset download concurrency (IO-bound)
    browser_pages: 4                        # Chrome tab pool (0 = use workers)
    timeout: 60                             # HTTP request timeout (s)
    render_timeout: 30                      # Page render hard timeout (s)
    settle: 1500                            # Network-idle settle (ms)
    scroll: false
    user_agent: ""                          # Empty = Chrome/124 macOS

    # Asset policy
    asset_same_domain: true                 # Skip 3rd-party CDN assets
    max_asset_bytes: 52428800               # 50 MB per-asset cap
    # skip_asset_exts: 42 extensions (video/audio/document/archive/installer)

    # Compliance
    respect_robots: true                    # temoto/robotstxt library
    crawl_delay: 0                          # ms (0 = use robots.txt)
    no_sitemap: false

    # Optimizations (all on by default)
    dedup_content: true                     # SHA-256 + hard links
    mobile_readable: true
    enable_resume: true                     # Frontier state checkpoint
    persist: true                           # Save state.json
    incremental: false                      # ETag/Last-Modified cache
    cache_max_age: 86400                    # seconds

    # Anti-detection (all on by default)
    headless: true                          # --no-headless for visible window
    stealth: true                           # 13 JS + 11 Chrome flags
    chrome_profile: "./wukong_chrome_profile"  # Persistent browser session
    chrome_path: ""                         # Empty = multi-platform auto-detect
    antibot_enabled: true                   # Auto-detect + escalate
    antibot_auto_escalate: true             # 5-level None→Flags→Stealth→Aggressive→Backoff

    # Session
    cookie_file: ""                         # Netscape-format cookie file

  pack:
    compress: true                          # zstd codec 5 (ZIM v6)
    incremental: false
    language: "eng"
    creator: "Wukong"
    format: "html"                          # html | zim | binary | app

# =============================================================================
# 19. ARD — Agentic Resource Discovery
# =============================================================================
ard:
  enabled: false
  registry_url: ""
  catalog_path: ".wukong/ard/catalog.json"
  publish_enabled: false

# =============================================================================
# 20. Summon — Sub-agent delegation
# =============================================================================
summon:
  enabled: true
  skills_dir: ".wukong/skills"
  max_concurrent: 5
  a2a_remotes: []

# =============================================================================
# 21–25. Skill | Evolution | Knowledge | Workflow | Dify
# =============================================================================
skill:
  enabled: true
  skills_dir: ".wukong/skills"
  auto_load: true
  max_skills: 20

evolution:
  enabled: false
  auto_patch: false
  analysis_provider: ""
  analysis_model: ""
  min_confidence: 0.7
  cooldown_period: "30m"
  max_patches_per_day: 10
  max_versions_kept: 10
  max_patch_size: 8192
  analysis_timeout: "60s"

knowledge:
  enabled: false
  embedder_provider: "lmstudio"
  embedder_model: "qwen3-embedding-4b"
  vector_store: "inmemory"
  max_results: 5
  enable_source_sync: false
  reranker_enabled: false
  search_tool_name: "knowledge_search"

workflow:
  mode: "single"
  max_iterations: 10
  cycle_mode: "default"
  stream_mode: "none"
  cache_enabled: false
  engine: "bsp"
  sub_agents: []

dify:
  enabled: false
  agent_name: "dify"
  enable_streaming: false
  timeout: "120s"

# =============================================================================
# 26. Service Endpoints — 4 protocols
# =============================================================================
a2a_server:                                  # A2A :9090
  enabled: true
  address: ":9090"
  agent_name: "wukong"
  agent_description: "Wukong AI Agent — A2A endpoint"

agui:                                        # AG-UI SSE :8080
  enabled: true
  address: ":8080"
  path: "/agui"

acp_server:                                  # ACP :9091
  enabled: true
  address: ":9091"
  path: "/acp"
  enable_streaming: true

acp_mcp:                                     # ACP MCP Bridge :3400
  enabled: true
  address: ":3400"
  path: "/mcp"

# =============================================================================
# 27–28. Eval | Extensions | Telemetry | Observability | Project
# =============================================================================
eval:
  enabled: false
  evalset_path: ".wukong/evals/default.evalset.json"
  results_path: ".wukong/evals/results.json"

extensions: []

telemetry:
  enabled: false
  exporter_type: "console"
  endpoint: "localhost:4317"
  service_name: "wukong"
  service_version: "1.0.0"
  environment: "development"
  sample_rate: 1.0

observability:
  langfuse_enabled: false

artifact:
  backend: "inmemory"

project_dir: "~/.config/wukong/"
