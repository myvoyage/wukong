# =============================================================================
# Wukong Configuration — 全功能配置模板 v0.9.0
# =============================================================================
# Go: 1.26 | 文件: 175 .go | 包: 29 | 配置段: 32 | 配置结构体: 39
#
# 加载优先级（从高到低）:
#   1. 命令行参数 (--provider, --model, --temperature, --max-tokens, --config)
#   2. 环境变量 (WUKONG_ 前缀, 如 WUKONG_DEFAULT_PROVIDER)
#   3. --config CLI 指定的文件
#   4. 当前目录 ./config.yaml
#   5. ~/.config/wukong/config.yaml
#   6. /etc/wukong/config.yaml (非 Windows)
#   7. 内置默认值
#
# 环境变量引用语法: ${ENV_VAR} (运行时自动展开)
#   api_key: "${OPENAI_API_KEY}"
# =============================================================================

log_level: "info"
default_provider: "lmstudio"

# =============================================================================
# 全局轻量模型 — 后台任务共享的廉价模型
# =============================================================================
# 回退链: 子系统.extractor_model → lightweight_model → default_provider
lightweight_provider: "lmstudio"
lightweight_model: "gemma-4-e4b-it"

# =============================================================================
# 1. Providers — AI 模型提供商 (7 种)
# =============================================================================
# 支持类型: openai | anthropic | google | deepseek | ollama | lmstudio | acp
providers:
  - name: "openai"
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  - name: "deepseek"
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"

  - name: "anthropic"
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"

  - name: "ollama"
    type: "ollama"
    api_key: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "llama3"

  - name: "lmstudio"
    type: "lmstudio"
    api_key: "lmstudio"
    base_url: "http://192.168.50.97:1234/v1"
    model: "google/gemma-4-26b-a4b"

  - name: "acp-coder"
    type: "acp"
    agent_url: "http://localhost:4000"
    model: "acp-default"

# =============================================================================
# 2. Agent — 核心行为与执行策略 (35+ 字段)
# =============================================================================
agent:
  # 执行限制
  max_llm_calls: 50
  max_tool_iterations: 30
  max_run_duration: "300s"
  parallel_tools: true
  streaming: true

  # 生成参数
  temperature: 0.7
  max_tokens: 4096
  # reasoning_effort: "medium"

  # 工具重试 (指数退避)
  tool_retry_enabled: true
  tool_retry_max_attempts: 3
  tool_retry_initial_wait: "1s"
  tool_retry_backoff_factor: 2.0
  enable_post_tool_prompt: true

  # Planner 规划器: builtin | react | ""
  planner: ""

  # Tool Search 自动工具筛选
  tool_search_enabled: true

  # Context Compaction 上下文压缩 (两遍)
  context_compaction: true

  # Session Recall 跨会话预加载
  session_recall_enabled: false

  # JSON Repair
  json_repair_enabled: false

  # Todo 任务管理
  todo_tool_enabled: true
  todo_enforcer_enabled: true

  # Agent Tools 子Agent工具
  agent_tools_enabled: false

  # 提示模板
  system_prompt_dir: "~/.config/wukong/prompts/"

  # Recipe 配方子Agent
  # recipe_dir: ".wukong/recipes/"
  # recipe_enabled: true

# =============================================================================
# 3. Security — 安全策略 (12 字段)
# =============================================================================
security:
  permission_mode: "smart"          # auto | smart | manual | chat_only
  require_approval: false
  malware_scan_enabled: true
  block_dangerous_commands: true
  blocked_commands:
    - "rm -rf /"
    - "dd if=/dev/zero"
    - "mkfs."
    - "> /dev/sda"
    - "fork bomb"
  default_timeout: "30s"
  max_timeout: "300s"
  allowlist: []
  denylist: []
  guardrail_enabled: false         # Prompt 注入检测
  ignore_file_enabled: true        # .wukongignore 文件黑名单
  ignore_file: ".wukongignore"

# =============================================================================
# 4. Session — 会话持久化
# =============================================================================
session:
  backend: "sqlite"               # sqlite | memory | redis
  db_path: "wukong.db"
  event_limit: 500
  ttl: "0h"
  enable_summary: true
  summary_trigger: 50

# =============================================================================
# 5. Memory — 长期记忆 (tRPC Memory)
# =============================================================================
memory:
  backend: "sqlite"
  db_path: "wukong.db"
  max_memories: 100
  # AutoExtract 异步 LLM 提取事实
  auto_extract: true
  extract_timeout: "600s"
  extractor_provider: "lmstudio"
  # extractor_model: ""
  # SmartCleanup 容量淘汰: 80%触发 → 60%目标, 70%新鲜度 + 30%长度
  enable_smart_cleanup: true
  cleanup_trigger_threshold: 0.8
  cleanup_target_threshold: 0.6
  memory_ttl: "720h"
  extractor_prompt: |
    You are a Memory Manager. Extract concise memories from the conversation.
    Today's date is {current_date}.

    <rules>
    1. Atomicity: One fact per memory.
    2. No subject prefix: Never start with "User", "The user", etc.
    3. Deduplication: Check existing memories before adding.
    4. Specificity: Include names, dates, places, quantities.
    5. Episode vs Fact: Episode = events with time, Fact = stable attributes.
    6. All speakers: Extract info about EVERY person.
    7. Skip transient greetings or trivial queries.
    </rules>

# =============================================================================
# 6. Todo — 任务追踪
# =============================================================================
todo:
  backend: "sqlite"
  db_path: "wukong.db"
  enable_native_todo: true
  enable_enforcer: true

# =============================================================================
# 7-11. CortexDB 记忆栈
# =============================================================================

# Recall — FTS5 全文搜索
recall:
  enabled: true
  backend: "sqlite"
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  search_mode: "fts5"             # fts5 | hybrid

# CortexDB — HNSW 向量 + 全文搜索
cortex:
  enabled: true
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  embedding_base_url: "http://192.168.50.97:1234"
  embedding_api_key: "lmstudio"
  embedding_model: "qwen3-embedding-0.6b-graphql"

# MemoryFlow — 转录记录 + 语义唤醒 (3层上下文)
memoryflow:
  enabled: true
  db_path: "wukong.db"
  namespace: "assistant"
  embedding_dimensions: 0          # 0=自动检测

# GraphFlow — 知识图谱 (RDF + SPARQL)
graphflow:
  enabled: true
  db_path: "wukong.db"
  max_chars_per_doc: 8000
  auto_extract: true               # 每轮对话自动提取实体/关系

# ImportFlow — 结构化数据导入 (DDL → KG)
importflow:
  enabled: true
  db_path: "wukong.db"

# =============================================================================
# 12. Revision — 上下文窗口管理 (3层压缩)
# =============================================================================
revision:
  enabled: true
  revision_provider: "lmstudio"
  enable_llm_summarize: true
  summary_cooldown: 120s
  summary_timeout: 30s
  max_command_output: 8000
  enable_semantic_search: false
  search_strategy: "include_all"
  max_context_tokens: 64000
  trim_ratio: 0.3

# =============================================================================
# 13. Browser — 浏览器自动化 (Chromedp)
# =============================================================================
browser:
  enabled: true
  browser_type: "chromium"
  headless: true
  cache_dir: ".wukong/cache"
  max_download_size: 104857600
  timeout: "60s"
  viewport_width: 1280
  viewport_height: 720
  search_backend: "duckduckgo"     # duckduckgo | searxng | tavily

# =============================================================================
# 14. Visualiser — 图表生成
# =============================================================================
visualiser:
  enabled: true
  output_dir: ".wukong/visuals"
  max_width: 1200
  max_height: 800

# =============================================================================
# 15. Tutorial — 交互式教程
# =============================================================================
tutorial:
  enabled: true
  language: "zh"

# =============================================================================
# 16. Top of Mind — 持久化指令注入
# =============================================================================
top_of_mind:
  enabled: true
  instruction_file: ".wukong/instructions.md"
  max_length: 2000

# =============================================================================
# 17. Code Mode — goja JavaScript 沙箱 (5层安全)
# =============================================================================
code_mode:
  enabled: true
  timeout: "10s"
  max_memory_mb: 128

# =============================================================================
# 18. Apps — HTML 应用管理
# =============================================================================
apps:
  enabled: true
  app_dir: ".wukong/apps"

# =============================================================================
# 19. ARD — Agentic Resource Discovery (双向发现)
# =============================================================================
# Outbound: 搜索/发现远程 AI Agent 和 MCP Server
# Inbound:  暴露 Wukong 自身为可发现的 ARD Registry
# Auto:     MCP 连接和 A2A 远程配置自动注册到目录
ard:
  enabled: false                      # 默认关闭, 按需启用
  registry_url: ""                    # 远程 ARD 注册表 URL (发现别人)
  catalog_path: ".wukong/ard/catalog.json"
  publish_enabled: false              # 让自己可被别​人发现
  # publish_port: 8081                # ARD Registry HTTP 端口

# =============================================================================
# 20. Summon — 子代理委派 + A2A 远程代理
# =============================================================================
summon:
  enabled: true
  skills_dir: ".wukong/skills"
  max_concurrent: 5
  a2a_remotes: []

# =============================================================================
# 21. Skill — Agent Skill 仓库
# =============================================================================
skill:
  enabled: true
  skills_dir: ".wukong/skills"
  auto_load: true
  max_skills: 20

# =============================================================================
# 22. Evolution — 技能自进化 (实验性)
# =============================================================================
evolution:
  enabled: false
  auto_patch: false
  analysis_provider: ""
  analysis_model: ""
  min_confidence: 0.7
  cooldown_period: "30m"
  max_patches_per_day: 10
  max_versions_kept: 10
  max_patch_size: 8192
  analysis_timeout: "60s"

# =============================================================================
# 23. Knowledge — RAG 知识库
# =============================================================================
knowledge:
  enabled: false
  embedder_provider: "lmstudio"
  embedder_model: "qwen3-embedding-4b"
  vector_store: "inmemory"
  max_results: 5
  enable_source_sync: false
  reranker_enabled: false
  search_tool_name: "knowledge_search"

# =============================================================================
# 24. Workflow — 多模式 Agent 编排 (10 种)
# =============================================================================
workflow:
  mode: "single"
  max_iterations: 10
  cycle_mode: "default"
  stream_mode: "none"
  cache_enabled: false
  engine: "bsp"
  sub_agents: []

# =============================================================================
# 25. Dify — Dify AI 平台集成
# =============================================================================
dify:
  enabled: false
  agent_name: "dify"
  enable_streaming: false
  timeout: "120s"

# =============================================================================
# 26. 服务端点 — 4 种协议
# =============================================================================

a2a_server:                         # A2A :9090
  enabled: true
  address: ":9090"
  agent_name: "wukong"
  agent_description: "Wukong AI Agent - A2A service endpoint"

agui:                               # AG-UI SSE :8080
  enabled: true
  address: ":8080"
  path: "/agui"

acp_server:                         # ACP :9091
  enabled: true
  address: ":9091"
  path: "/acp"
  enable_streaming: true

acp_mcp:                            # ACP MCP Bridge :3400
  enabled: true
  address: ":3400"
  path: "/mcp"

# =============================================================================
# 27. Eval — 代理评估
# =============================================================================
eval:
  enabled: false
  evalset_path: ".wukong/evals/default.evalset.json"
  results_path: ".wukong/evals/results.json"

# =============================================================================
# 28. Extensions — 外部 MCP 扩展 (12 个内置自动注册)
# =============================================================================
extensions: []

# =============================================================================
# 29-32. Telemetry / Observability / Artifact / Project
# =============================================================================
telemetry:
  enabled: false
  exporter_type: "console"
  endpoint: "localhost:4317"
  service_name: "wukong"
  service_version: "1.0.0"
  environment: "development"
  sample_rate: 1.0

observability:
  langfuse_enabled: false

artifact:
  backend: "inmemory"

project_dir: "~/.config/wukong/"
