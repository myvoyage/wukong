# Advanced recipe demonstrating P3 features:
#   - P3-A: model override (uses a specific LLM model)
#   - P3-B: timeout (limits execution time)
#
# This recipe is a quick code reviewer that uses a specific model
# and has a strict 30-second timeout. It inherits from base_reviewer
# (P2-B) and includes structured output validation (P1-B).
name: advanced_demo
description: "Quick code reviewer with model override and timeout"

extends: base_reviewer

instruction: |
  You are a quick code reviewer. Be concise and focus on critical
  issues only. Skip minor style suggestions.

# P3-A: Override the default model.
model: "gpt-4o"

# P3-B: Limit execution to 30 seconds.
timeout: "30s"

# Lower temperature for more consistent results.
temperature: 0.1

# Fewer iterations for faster execution.
max_iterations: 3
max_tokens: 2048
