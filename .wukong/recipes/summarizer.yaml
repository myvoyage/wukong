# Example simple recipe (backward-compatible, no parameters).
#
# This recipe demonstrates the original recipe format that remains
# fully supported. No `parameters`, `prompt`, or `response` fields
# are defined, so the sub-agent is invoked with the main agent's
# raw tool-call arguments as its user message — exactly as before
# the P0 enhancement.
name: summarizer
description: "Condenses long text into a concise summary"

instruction: |
  You are an expert summarizer. Condense the given content into a
  clear, structured summary. Preserve key facts, decisions, and
  action items. Use bullet points for clarity. Keep the summary
  focused and concise.

# No tools needed — this is an instruction-only sub-agent.
tools: []

temperature: 0.3
max_tokens: 1024
max_iterations: 2
skip_summarization: true
