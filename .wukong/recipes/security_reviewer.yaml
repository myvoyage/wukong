# Security-focused reviewer that extends base_reviewer (P2-B).
#
# Inherits instruction format, response schema, retry config, and
# tools from base_reviewer. Overrides instruction and temperature
# for security-specific analysis.
name: security_reviewer
description: "Security-focused code reviewer (extends base_reviewer)"

extends: base_reviewer

instruction: |
  You are an expert security code reviewer. Focus on:
  - Injection vulnerabilities (SQL, command, XSS)
  - Authentication and authorization flaws
  - Sensitive data exposure
  - Insecure cryptographic practices
  - Known vulnerability patterns (CWE/OWASP Top 10)
  Be specific about attack vectors and remediation.

# Lower temperature for more consistent security analysis.
temperature: 0.1
