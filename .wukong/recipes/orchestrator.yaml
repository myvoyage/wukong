# Orchestrator recipe demonstrating sub-recipe composition (P1-A).
#
# This recipe references other recipes in its tools list. The
# referenced recipe tools are granted to this recipe's sub-agent,
# enabling hierarchical orchestration: the orchestrator can delegate
# to specialized sub-recipes.
#
# Dependency graph (topologically sorted at load time):
#   base_reviewer (no deps)
#   security_reviewer (extends base_reviewer)
#   summarizer (no deps)
#   orchestrator (depends on security_reviewer + summarizer)
name: orchestrator
description: "Orchestrates code review by delegating to sub-recipes"

instruction: |
  You are a code review orchestrator. When given code to review:
  1. Delegate security analysis to recipe-security_reviewer
  2. Delegate summary generation to recipe-summarizer
  3. Combine the results into a final report
  Use the sub-recipe tools for specialized tasks rather than
  doing everything yourself.

tools:
  - file_read
  - recipe-security_reviewer    # P1-A: sub-recipe reference
  - summarizer                  # bare name form also works

temperature: 0.3
max_tokens: 2048
max_iterations: 10              # more iterations for orchestration
