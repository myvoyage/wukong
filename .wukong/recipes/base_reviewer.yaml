# Base recipe for code review — designed to be extended by
# specialized reviewers (P2-B: recipe extends).
#
# Child recipes can inherit all fields from this base and override
# only what they need:
#
#   name: security_reviewer
#   extends: base_reviewer
#   instruction: "You are a security-focused reviewer."
#   temperature: 0.1
name: base_reviewer
description: "Base code reviewer with structured output and retry"

instruction: |
  You are an expert code reviewer. Analyze code for bugs, security
  vulnerabilities, performance issues, and style violations.
  Provide actionable, specific feedback.

# Structured output with validation (P1-B).
response:
  json_schema:
    type: object
    properties:
      issues:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [critical, warning, info]
            message:
              type: string
            line:
              type: integer
          required: [severity, message]
      summary:
        type: string
    required: [issues, summary]
  strict: true
  validate_output: true
  description: "Structured review report"

# Retry on failure or validation error (P1-B).
retry:
  max_attempts: 3
  initial_wait: "1s"
  backoff_factor: 2.0
  max_wait: "10s"

tools:
  - file_read
  - code_search

temperature: 0.2
max_tokens: 4096
max_iterations: 5
