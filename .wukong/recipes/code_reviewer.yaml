# Example parameterized recipe with structured output.
#
# This recipe defines a code reviewer sub-agent that:
#   1. Accepts parameters (language, focus, code) from the main agent
#   2. Renders a prompt template with those parameters
#   3. Returns a structured JSON report conforming to a schema
#
# The main agent calls recipe-code_reviewer with JSON arguments like:
#   {"language": "go", "focus": "security", "code": "func main() {...}"}
name: code_reviewer
description: "Parameterized code reviewer that analyzes code for bugs, security issues, and improvements, returning a structured report"

# Static system prompt for the sub-agent.
instruction: |
  You are an expert code reviewer. Analyze code thoroughly for:
  bugs, security vulnerabilities, performance issues, style violations,
  and missing error handling. Be specific about what to fix and why.
  Provide actionable suggestions in a clear format.

# Parameterized task template rendered with Go text/template syntax.
# Variables {{.key}} are filled from the parameters below.
prompt: |
  Review the following {{.language}} code. Focus on {{.focus}}.

  ```{{.language}}
  {{.code}}
  ```

  Provide a structured review with each issue's severity, message,
  and line number (if applicable), plus an overall summary.

# Dynamic parameters the main agent supplies at call time.
parameters:
  - key: language
    description: "Programming language of the code"
    type: select
    required: true
    options:
      - go
      - python
      - rust
      - javascript
      - typescript
      - java

  - key: focus
    description: "Review focus area (e.g. security, performance, all issues)"
    type: string
    required: false
    default: "all issues"

  - key: code
    description: "The source code to review"
    type: string
    required: true

# Structured output: the sub-agent's final response must conform to
# this JSON schema. Uses the model-native response_format mechanism
# (provider support required).
response:
  json_schema:
    type: object
    properties:
      issues:
        type: array
        description: "List of identified issues"
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [critical, warning, info]
              description: "Issue severity level"
            message:
              type: string
              description: "Description of the issue"
            line:
              type: integer
              description: "Line number where the issue occurs (0 if N/A)"
            suggestion:
              type: string
              description: "Recommended fix"
          required: [severity, message]
      summary:
        type: string
        description: "Overall assessment of the code quality"
    required: [issues, summary]
  strict: true
  description: "Structured code review report"

# Tools granted to this sub-agent.
tools:
  - file_read
  - code_search

# LLM generation parameters.
temperature: 0.2
max_tokens: 4096
max_iterations: 5
skip_summarization: false
