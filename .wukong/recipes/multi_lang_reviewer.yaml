# Advanced recipe demonstrating P4 features:
#   - P4-A: instruction templating (dynamic system prompt)
#   - P3-B: timeout control
#   - P1-B: retry with output validation
#
# The instruction adapts based on the language and style parameters,
# creating a tailored system prompt for each call.
name: multi_lang_reviewer
description: "Multi-language code reviewer with dynamic instruction templating"

# P4-A: Dynamic instruction template — renders with the same
# parameters as the prompt.
instruction: |
  You are a {{.language}} code reviewer.
  Follow {{.style}} coding conventions.
  Focus on {{.focus}} issues.
  Be specific and provide actionable feedback.

prompt: |
  Review the following {{.language}} code:

  ```{{.language}}
  {{.code}}
  ```

parameters:
  - key: language
    description: "Programming language"
    type: select
    required: true
    options: [go, python, rust, javascript, typescript, java]

  - key: style
    description: "Code style convention"
    type: string
    required: false
    default: "standard"

  - key: focus
    description: "Review focus area"
    type: string
    required: false
    default: "all issues"

  - key: code
    description: "Source code to review"
    type: string
    required: true

# P1-B: Retry with output validation.
retry:
  max_attempts: 2
  initial_wait: "1s"
  backoff_factor: 2.0

# P3-B: Timeout.
timeout: "60s"

response:
  json_schema:
    type: object
    properties:
      issues:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [critical, warning, info]
            message:
              type: string
            line:
              type: integer
      summary:
        type: string
    required: [issues, summary]
  strict: true
  validate_output: true

tools:
  - file_read

temperature: 0.2
max_tokens: 4096
max_iterations: 5
